name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: stage tarball
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="scout-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/scout" "dist/${stage}/scout"
          strip "dist/${stage}/scout" || true
          cp LICENSE README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          echo "tarball=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.stage }}
          path: ${{ steps.stage.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: release ${{ github.ref_name }}
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: compute SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum scout-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scout-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
